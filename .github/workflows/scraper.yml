name: SKU Scraper

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL stranky na scrapovanie'
        required: true
        default: 'https://www.vivaeshop.cz/koupelny/sprchy?manufacturer=6400'
      output:
        description: 'Nazov vystupneho suboru'
        required: false
        default: 'sku_output.txt'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium pre Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Spusti scraper
        run: node scraper.js "${{ github.event.inputs.url }}" "${{ github.event.inputs.output }}"

      - name: Upload vysledkov
        uses: actions/upload-artifact@v4
        with:
          name: sku-results
          path: ${{ github.event.inputs.output }}
          retention-days: 30
