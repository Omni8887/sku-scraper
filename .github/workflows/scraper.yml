name: SKU Scraper

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL stránky na scrapovanie'
        required: true
        default: 'https://www.vivaeshop.cz/koupelny/sprchy?manufacturer=6400'
      output:
        description: 'Názov výstupného súboru'
        required: false
        default: 'sku_output.txt'

  schedule:
    # Každý pondelok o 7:00 UTC (9:00 SK čas)
    # - cron: '0 7 * * 1'
    # (zakomentované – odkomentuj ak chceš automatické spúšťanie)

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium pre Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Spusti scraper
        run: node scraper.js "${{ github.event.inputs.url }}" "${{ github.event.inputs.output }}"

      - name: Upload výsledkov
        uses: actions/upload-artifact@v4
        with:
          name: sku-results
          path: ${{ github.event.inputs.output }}
          retention-days: 30
